version: "3.8"

services:
  db:
    image: postgres:16.3-alpine3.19
    restart: always
    shm_size: 128mb
    container_name: postgres
    env_file: ".env"
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}

    ports:
      - 8001:5432

    volumes:
      - data:/var/lib/postgresql/data
volumes:
  data:
